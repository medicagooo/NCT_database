name = "nct-database"
main = "src/worker/index.ts"
compatibility_date = "2026-04-19"
workers_dev = true
routes = [
  { pattern = "testdb.medicago.top", custom_domain = true }
]

[observability.logs]
enabled = true

# Runtime variables are intentionally not declared in [vars].
# Set them in Cloudflare Variables / Secrets so Git-based deploys do not overwrite them.

[assets]
directory = "./dist/client"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "nct-database"
database_id = "f6de668e-9666-4d9d-8854-9dfe25fb17ad"
migrations_dir = "./migrations"

[[r2_buckets]]
binding = "EXPORT_BUCKET"
bucket_name = "nct-database-exports"
preview_bucket_name = "nct-database-exports-preview"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "nct-database-media"
preview_bucket_name = "nct-database-media-preview"

[triggers]
crons = ["0 18 * * *", "0 * * * *"]
